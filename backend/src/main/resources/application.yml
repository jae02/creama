spring:
  application:
    name: creama-backend
    
  datasource:
    # 환경변수 우선 사용, 로컬 기본값 fallback
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/creama_db?allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:skymp159}
    driver-class-name: org.mariadb.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
        
server:
  port: 8081
  
logging:
  level:
    com.creama: INFO
